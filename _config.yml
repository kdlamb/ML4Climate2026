# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Machine Learning for Climate Science and Environmental Sustainability
author: Kara Lamb
copyright: "2026"
logo: logo_class.png

# The accessible pilot is its own standalone book (built separately and nested
# at /accessible/); keep the main book from globbing its pages.
exclude_patterns:
  - accessible_pilot
  # Zoom class transcripts are kept local (gitignored); don't build them as pages.
  - "**/*Transcript.md"

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: force
  allow_errors: true      # keep outputs even if a cell raises
  timeout: 300  # time in seconds (default is 30)
  # Ship saved outputs instead of re-running these in CI:
  #  - datapreparation: kagglehub download needs credentials CI lacks
  #  - randomforests: needs the 139 MB Zenodo CSV, which is too big to commit
  #  - PCA: fetches MNIST from OpenML and streams NOAA SST over OPeNDAP (needs
  #    xarray + a live NOAA THREDDS connection); ships its saved outputs instead
  #  - assignments/*: student templates with empty answer cells (would NameError)
  exclude_patterns:
    - "**/datapreparation.ipynb"
    - "**/randomforests.ipynb"
    - "**/PCA.ipynb"
    - "**/ann_tutorial.ipynb"   # needs tensorflow + downloads the PPE data from Zenodo; ships saved outputs
    - "assignments/*.ipynb"

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/kdlamb/ML4Climate2026  # Online location of your book
  path_to_book: docs  # Optional path to your book, relative to the repository root
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true