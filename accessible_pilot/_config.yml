# Accessible pilot build for ML4Climate2026.
# Minimal, standalone Jupyter Book: markdown-only, no notebook execution,
# no bibtex, no scientific stack. Builds in seconds and is easy to host or
# retire. The page files keep the same names as in the main book so
# improvements can be copied straight back into ML4Climate2026/.
title: "ML4Climate 2026 — Accessible Pilot"
author: Kara Lamb

only_build_toc_files: true

execute:
  execute_notebooks: 'off'

html:
  use_issues_button: false
  use_repository_button: false

sphinx:
  config:
    html_show_copyright: false
